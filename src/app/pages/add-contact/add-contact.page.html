<ion-header>
  <ion-toolbar>
    <ion-title>Agregar Contacto</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">
  <ion-item>
    <ion-input [(ngModel)]="telefono" placeholder="Número de teléfono"></ion-input>
  </ion-item>

  <ion-button expand="block" (click)="addContact()">Agregar</ion-button>
</ion-content>
