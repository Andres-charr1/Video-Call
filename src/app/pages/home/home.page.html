<ion-header>
  <ion-toolbar>
    <ion-title>Mis Contactos</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">
  <ion-list *ngIf="contacts.length > 0; else sinContactos">
    <ion-item-sliding *ngFor="let contacto of contacts">
      <ion-item>
        <ion-label>
          <h2>{{ contacto.nombre }}</h2>
          <p>{{ contacto.telefono }}</p>
          <p>{{ contacto.email }}</p>
        </ion-label>
      </ion-item>

      <ion-item-options side="end">
        <ion-item-option color="primary" (click)="editarContacto(contacto)">Editar</ion-item-option>
        <ion-item-option color="danger" (click)="eliminarContacto(contacto.id)">Eliminar</ion-item-option>
      </ion-item-options>
    </ion-item-sliding>
  </ion-list>

  <ng-template #sinContactos>
    <ion-text color="medium">No tienes contactos aún.</ion-text>
  </ng-template>

  <ion-fab vertical="bottom" horizontal="end" slot="fixed">
    <ion-fab-button (click)="goToAddContact()">
      <ion-icon name="person-add-outline"></ion-icon>
    </ion-fab-button>
  </ion-fab>
</ion-content>
